# High-Throughput Stream Configuration
# This file configures the sender and receiver for optimal performance

# Network configuration
network:
  local_addr: "0.0.0.0"
  remote_addr: "localhost"
  port: 8080
  use_udp: false  # Use UDP instead of TCP

# Performance configuration
performance:
  buffer_size: 1048576  # 1MB buffer
  packet_size: 8192     # 8KB packets for optimal throughput
  window_size: 1000     # Sliding window size
  udp_payload_size: 1024 # 1024-byte UDP payload size

# Forward Error Correction (FEC) configuration
fec:
  enable: false         # Set to true to enable FEC
  redundancy: 0.2       # 20% redundancy for error correction

# Timing configuration
timing:
  timeout: 30s          # Connection timeout
  retry_interval: 100ms # Packet retransmission interval
  heartbeat_interval: 1s # Heartbeat interval

# Link monitoring configuration
link_monitoring:
  enable: false         # Enable link interruption detection
  interval: 1s          # How often to check link status
  timeout: 5s           # Time to wait before declaring link down

# Continuous mode configuration
continuous_mode:
  enable: false         # Run in continuous mode
  data_sink: "disk"     # Data sink: disk, ram, or none
  output_directory: "./output"  # Directory for saving files
  max_file_size: 104857600  # 100MB maximum file size before rotation
  enable_file_rotation: false  # Enable automatic file rotation

# Logging configuration
logging:
  level: "info"         # debug, info, warn, error
  enable_metrics: true  # Enable performance metrics